name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── Frontend → Vercel ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

  # ── Backend → Railway (auto-deploys on push when GitHub is connected) ──────
  # Railway detects pushes to main automatically — no extra step needed.
  # Just connect this repo in the Railway dashboard once.
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    steps:
      - name: Done
        run: echo "Frontend deployed to Vercel. Railway backend auto-deploys on push."
